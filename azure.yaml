name: foundry-agentic-workshop
metadata:
  template: foundry-agentic-workshop@0.0.1
infra:
  provider: bicep
  path: infra
hooks:
  postprovision:
    posix:
      shell: sh
      run: python scripts/assign-attendee-roles.py && python scripts/seed-product-index.py && python scripts/seed-document-index.py
    windows:
      shell: pwsh
      run: python scripts/assign-attendee-roles.py; python scripts/seed-product-index.py; python scripts/seed-document-index.py
services: {}
