name: Lab Improvement or Addition
description: Suggest an improvement, clarification, or content addition to an existing lab module (new step, better explanation, additional screenshot, etc.).
title: "improvement: <module> — <short description>"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template to propose improvements or additions to an **existing** lab module — for example, clearer instructions, a missing validation step, an additional concept, or a new screenshot. To propose a brand-new module within an existing lab series, use the **New Module** template. To propose an entirely new lab series, use the **New Lab** template.

  - type: dropdown
    id: lab
    attributes:
      label: Lab series
      description: Which lab series does this affect?
      options:
        - "introduction-foundry-agent-service"
        - "Other / repository-wide"
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Module
      description: Which module(s) would this improvement affect?
      multiple: true
      options:
        - "01 — Setup"
        - "02 — Foundry Portal Walkthrough"
        - "03 — Foundry Toolkit for VS Code"
        - "04 — Prompt Agents"
        - "05 — Agent Tools and Evaluations"
        - "06 — MCP Tools"
        - "07 — Foundry IQ"
        - "08 — Agent Framework Python"
        - "09 — Hosted Agents"
        - "10 — Foundry Toolboxes"
        - "11 — Agent Ops and Agent ID"
        - "12 — Publishing Agents"
        - "Not module-specific"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area of improvement
      description: What aspect of the module would this improve?
      multiple: true
      options:
        - "Lab instructions (README)"
        - "Concepts / explanations"
        - "Starter file"
        - "Solution file"
        - "Validation steps"
        - "Troubleshooting guidance"
        - "Screenshots"
        - "Scripts"
        - "Infrastructure"
        - "Documentation site"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or gap
      description: What is confusing, missing, or could be done better in the current module?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed improvement
      description: Describe the change. If it is a wording change, include the suggested replacement text. If it is a new step, describe where it should appear and what it should cover.
    validations:
      required: true

  - type: dropdown
    id: audience-impact
    attributes:
      label: Primary audience impacted
      description: Who benefits most from this change?
      multiple: true
      options:
        - "Attendees"
        - "Facilitators"
        - "Proctors"
        - "Organizers (provisioning / infra)"
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Links to Microsoft Learn documentation, portal screenshots, or any other relevant context.

  - type: checkboxes
    id: confirm
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
