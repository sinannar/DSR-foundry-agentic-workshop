name: End-to-End Test

on:
  workflow_call:
    inputs:
      ENVIRONMENT:
        description: The environment to use for E2E testing.
        required: true
        type: string
      BUILD_VERSION:
        description: The version of the build to deploy to resources.
        required: true
        type: string
      AZURE_LOCATION:
        description: The Azure region to deploy resources to.
        required: true
        type: string
      AZURE_ENV_NAME:
        description: The name of the Azure environment.
        required: true
        type: string

    secrets:
      AZURE_TENANT_ID:
        description: Azure tenant ID for deployment authentication.
        required: true
      AZURE_SUBSCRIPTION_ID:
        description: Azure subscription ID for deployment authentication.
        required: true
      AZURE_CLIENT_ID:
        description: Azure client ID for deployment authentication.
        required: true

jobs:
  validate-infrastructure:
    name: Validate Infrastructure
    uses: ./.github/workflows/validate-infrastructure.yml
    with:
      ENVIRONMENT: ${{ inputs.ENVIRONMENT }}
      BUILD_VERSION: ${{ inputs.BUILD_VERSION }}
      AZURE_LOCATION: ${{ inputs.AZURE_LOCATION }}
      AZURE_ENV_NAME: ${{ inputs.AZURE_ENV_NAME }}
    secrets:
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}

  provision-infrastructure:
    name: Provision Infrastructure
    needs: [validate-infrastructure]
    uses: ./.github/workflows/provision-infrastructure.yml
    with:
      ENVIRONMENT: ${{ inputs.ENVIRONMENT }}
      BUILD_VERSION: ${{ inputs.BUILD_VERSION }}
      AZURE_LOCATION: ${{ inputs.AZURE_LOCATION }}
      AZURE_ENV_NAME: ${{ inputs.AZURE_ENV_NAME }}
    secrets:
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}

  smoke-test:
    name: Smoke Test
    needs: [provision-infrastructure]
    uses: ./.github/workflows/smoke-test.yml
    with:
      ENVIRONMENT: ${{ inputs.ENVIRONMENT }}
      AZURE_ENV_NAME: ${{ inputs.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ inputs.AZURE_LOCATION }}
    secrets:
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}

  run-e2e-tests:
    name: Run E2E Tests
    needs: [provision-infrastructure]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install -r shared/requirements.txt

      - name: Run E2E test suite when present
        run: |
          if [ -d "tests/e2e" ]; then
            python -m pytest tests/e2e
          else
            echo "No tests/e2e directory yet. Skipping E2E test execution."
          fi

  delete-infrastructure:
    name: Delete Provisioned Infrastructure
    needs: [provision-infrastructure, smoke-test, run-e2e-tests]
    if: always()
    uses: ./.github/workflows/delete-infrastructure.yml
    with:
      ENVIRONMENT: ${{ inputs.ENVIRONMENT }}
      AZURE_LOCATION: ${{ inputs.AZURE_LOCATION }}
      AZURE_ENV_NAME: ${{ inputs.AZURE_ENV_NAME }}
    secrets:
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
