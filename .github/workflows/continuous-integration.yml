name: Continuous Integration

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/continuous-integration.yml'
      - '.github/workflows/lint-markdown.yml'
      - '.github/workflows/validate-infrastructure.yml'
      - '.markdownlint*.json*'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'docs/**'
      - 'labs/**'
      - 'scripts/**'
      - 'shared/**'
      - 'infra/**'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/continuous-integration.yml'
      - '.github/workflows/lint-markdown.yml'
      - '.github/workflows/validate-infrastructure.yml'
      - '.markdownlint*.json*'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'docs/**'
      - 'labs/**'
      - 'scripts/**'
      - 'shared/**'
      - 'infra/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: continuous-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  markdown-lint:
    name: Markdown Lint
    uses: ./.github/workflows/lint-markdown.yml
    permissions:
      contents: read
      pull-requests: write

  docs-build:
    name: Build Workshop Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs site
        run: pnpm run docs:build

  terraform-quality:
    name: Terraform Lint and Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: '>=1.9.0'

      - name: Install TFLint
        uses: terraform-linters/setup-tflint@v6

      - name: Initialize TFLint plugins
        working-directory: infra
        run: tflint --init

      - name: Terraform format check
        working-directory: infra
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        working-directory: infra
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: infra
        run: terraform validate

      - name: TFLint check
        working-directory: infra
        run: tflint --recursive

  python-smoke:
    name: Python Syntax Smoke Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Compile Python sources
        run: python -m compileall labs scripts shared
